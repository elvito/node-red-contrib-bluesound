<script type="text/javascript">
    // Config-Node (unverändert, aber zur Vollständigkeit)
    RED.nodes.registerType('bluesound-config', {
        category: 'Bluesound',
        color: '#a6bbcf',
        defaults: {
            name: { value: '' },
            host: { value: '', required: true },
            port: { value: 11000 },
            timeout: { value: 5000 }
        },
        inputs: 0,
        outputs: 0,
        icon: 'font-awesome/fa-volume-up',
        label: function() {
            return this.name || "Bluesound Config";
        },
        oneditprepare: function() {
            $('#node-input-port').spinner({ min: 1, max: 65535 });
            $('#node-input-timeout').spinner({ min: 1000, max: 30000, step: 1000 });
        }
    });

    // Haupt-Node (KORRIGIERT: value-Feld NUR dynamisch, NICHT in defaults!)
    RED.nodes.registerType('bluesound', {
        category: 'Bluesound',
        color: '#a6bbcf',
        defaults: {
            name: { value: '' },
            device: { type: 'bluesound-config', required: true },
            action: { value: 'status' }
            // ⚠️ value-FELD ENTFERNT! (wird dynamisch eingefügt)
        },
        inputs: 1,
        outputs: 1,
        icon: 'font-awesome/fa-music',
        label: function() {
            return this.name || this.action || "Bluesound";
        },
        oneditprepare: function() {
            // Dropdown für Aktionen
            $('#node-input-action').append(
                $('<option></option>').val('status').text('Status'),
                $('<option></option>').val('play').text('Play'),
                $('<option></option>').val('pause').text('Pause'),
                $('<option></option>').val('stop').text('Stop'),
                $('<option></option>').val('next').text('Next'),
                $('<option></option>').val('previous').text('Previous'),
                $('<option></option>').val('volume').text('Volume'),
                $('<option></option>').val('mute').text('Mute'),
                $('<option></option>').val('playurl').text('Play URL'),
                $('<option></option>').val('preset').text('Load Preset'),
                $('<option></option>').val('presets').text('List Presets'),
                $('<option></option>').val('syncstatus').text('Sync Status'),
                $('<option></option>').val('services').text('Services'),
                $('<option></option>').val('shuffle').text('Shuffle'),
                $('<option></option>').val('repeat').text('Repeat')
            );

            // Value-Feld DYNAMISCH einfügen (NICHT in defaults!)
            const actionField = $('#node-input-action');
            const valueRow = $('<div class="form-row">')
                .append('<label for="node-input-value">Value</label>')
                .append('<input type="text" id="node-input-value" placeholder="e.g. 50 or preset ID">');

            actionField.closest('.form-row').after(valueRow);

            function updateValueField() {
                const action = actionField.val();
                if (['volume', 'playurl', 'preset'].includes(action)) {
                    valueRow.show();
                } else {
                    valueRow.hide();
                }
            }

            actionField.on('change', updateValueField);
            updateValueField();
        }
    });
</script>
